  <path d="M 50 17 A 33 33 0 0 1 83 50" fill="none" stroke="#00e5ff" stroke-width="9"/>
  <path d="M 83 50 A 33 33 0 0 1 50 83" fill="none" stroke="#ff2d6b" stroke-width="5" opacity="0.5"/>
  <path d="M 50 83 A 33 33 0 0 1 17 50" fill="none" stroke="#ff2d6b" stroke-width="9"/>

  <!-- Cyan head (right) -->
