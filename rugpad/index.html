			body {
				background: #000;

			}
			h1::after {
				content: "\00a0";
				display: inline-block;
				transform: translateY(0em);
				animation: blink 1s infinite step-start;
			}
			a {
				color: #aae;
			}
			a::visited, a::active {
				color: #eae;
			}
			p {
				max-width: 500px;
			}
			@keyframes blink {
				0% {
					background: #dde;
				}
				50% {
					background: transparent;
				}
				100% {
					background: #dde;
				}

			}
			body > * {
				margin: 1em auto;
			}
			body > img {
				display: block;

			}
		</style>

	<body>
		<h1>Coming soon...</h1>
		<img src="../fomonad-named.svg">
		<p>You're very early.</p>
		<p>The game starts <span id="countdown">soon</span>.</p>
		<script>
			(function() {
				var target = 1775741400000;
				var el = document.getElementById('countdown');
				var timer = setInterval(update, 990);
				function pad(n, label) {
					return n + ' ' + label + (n === 1 ? '' : 's');
				}
				function update() {
					var diff = target - Date.now();
					if (diff <= 0) {
						el.textContent = 'very soon. Join our Discord or Telegram to be notified when.';
						clearInterval(timer);
						return;
					}
					var s = Math.floor(diff / 1000);
					var days = Math.floor(s / 86400); s %= 86400;
					var hours = Math.floor(s / 3600); s %= 3600;
					var minutes = Math.floor(s / 60); s %= 60;
					var parts = [];
					if (days) parts.push(pad(days, 'day'));
					if (hours) parts.push(pad(hours, 'hour'));
					if (minutes) parts.push(pad(minutes, 'minute'));
					parts.push(pad(s, 'second'));
					el.textContent = "in " + parts.join(', ');
				}
				update();
				
			})();
		</script>
		<p>How will you seize this oppertunity?</p>
